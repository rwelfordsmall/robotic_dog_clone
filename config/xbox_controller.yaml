# xbox_controller.yaml
# ─────────────────────────────────────────────
# joy_node configuration for Xbox controller (USB or Bluetooth via xpadneo).
# ─────────────────────────────────────────────

joy_node:
  ros__parameters:
    device_id: 0              # /dev/input/js0
    deadzone: 0.10
    autorepeat_rate: 20.0     # Hz — keeps topic alive without input
    coalesce_interval_ms: 1

teleop_node:
  ros__parameters:
    axis_linear:
      x: 1    # Left stick Y  → forward/back
      y: 0    # Left stick X  → strafe
    axis_angular:
      yaw: 3  # Right stick X → turn
    scale_linear:
      x: 0.5
      y: 0.5
    scale_angular:
      yaw: 1.0
    enable_button: 4          # LB must be held to move
    enable_turbo_button: 5    # RB for turbo speed
