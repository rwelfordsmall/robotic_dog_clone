# slam_params.yaml
# -----------------
# SLAM Toolbox configuration for the Dog quadruped (online async mapping mode).
#
# Subscribes to:  /scan        (LaserScan from Hokuyo UTM-30LX)
# Requires TF:    odom → base_link  (from ZED 2 visual odometry)
# Publishes TF:   map  → odom       (consumed by Nav2)
# Publishes:      /map (OccupancyGrid)
#
# After building a good map, save it with:
#   ros2 run slam_toolbox lifelong_slam_toolbox_node --ros-args -p mode:=localization
# or use the SLAM Toolbox panel in RViz to serialize/save.

slam_toolbox:
  ros__parameters:

    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Frames
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_link
    scan_topic:  /scan
    mode:        mapping    # or 'localization' with a saved map

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02   # seconds between map→odom TF publishes
    map_update_interval: 5.0         # seconds between map saves to file
    resolution: 0.05                 # metres per cell
    max_laser_range: 30.0            # UTM-30LX max range
    minimum_time_interval: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000      # bytes for serialised map buffer

    enable_interactive_mode: true    # allows loop closure via RViz panel

    # Scan matching
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.5     # metres before a new scan is added
    minimum_travel_heading: 0.5      # radians before a new scan is added
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop closure search
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Penalties
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
