# ros2_controllers.yaml
# ----------------------
# Active controller configuration for the migrated 8-DOF robot.
#
# The active joint command path is:
#   /joint_angles (motor space, 8 values)
#        -> sim_bridge_node decouples knee commands
#        -> joint_group_position_controller (geometric / URDF space, same 8-joint order)
#
# Joint order in joint_group_position_controller must match the post-bridge
# geometric / URDF command vector:
#   [fr_shoulder_joint, fr_knee_joint,
#    fl_shoulder_joint, fl_knee_joint,
#    rr_shoulder_joint, rr_knee_joint,
#    rl_shoulder_joint, rl_knee_joint]

controller_manager:
  ros__parameters:
    update_rate: 50  # Hz — matches CONTROL_RATE_HZ in gait_node.py

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # NOTE:
    # This controller consumes geometric / URDF joint angles.
    # It does NOT consume the raw /joint_angles motor-space vector directly.
    # sim_bridge_node performs the knee decoupling before commands reach this controller.
    joint_group_position_controller:
      type: position_controllers/JointGroupPositionController

joint_state_broadcaster:
  ros__parameters: {}

joint_group_position_controller:
  ros__parameters:
    joints:
      - fr_shoulder_joint
      - fr_knee_joint
      - fl_shoulder_joint
      - fl_knee_joint
      - rr_shoulder_joint
      - rr_knee_joint
      - rl_shoulder_joint
      - rl_knee_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    open_loop_control: false
    allow_nonzero_velocity_at_trajectory_end: true
    gains:
      fr_shoulder_joint: {p: 200.0, i: 0.0, d: 5.0}
      fr_knee_joint:     {p: 200.0, i: 0.0, d: 5.0}
      fl_shoulder_joint: {p: 200.0, i: 0.0, d: 5.0}
      fl_knee_joint:     {p: 200.0, i: 0.0, d: 5.0}
      rr_shoulder_joint: {p: 200.0, i: 0.0, d: 5.0}
      rr_knee_joint:     {p: 200.0, i: 0.0, d: 5.0}
      rl_shoulder_joint: {p: 200.0, i: 0.0, d: 5.0}
      rl_knee_joint:     {p: 200.0, i: 0.0, d: 5.0}
