; PlatformIO Project Configuration File — Dog Robot Teensy 4.1 Firmware
;
; Drives 12x CubeMars AK45-36 motors via CAN bus (MIT mini cheetah protocol)
; using FlexCAN_T4 + micro-ROS over USB Serial.
;
; Flash:  pio run --target upload
; Serial monitor: pio device monitor --baud 115200

[env:teensy41]
platform = teensy
board    = teensy41
framework = arduino

board_microros_distro    = humble
board_microros_transport = serial

upload_protocol = teensy-cli

lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio
    https://github.com/tonton81/FlexCAN_T4
    adafruit/Adafruit BNO08x
    mikalhart/TinyGPSPlus

; Build flags (optional — increase CAN TX/RX buffer sizes here if needed)
build_flags =
    -D CAN1_TX_BUFFER_SIZE=64
    -D CAN1_RX_BUFFER_SIZE=64
    -D CAN2_TX_BUFFER_SIZE=64
    -D CAN2_RX_BUFFER_SIZE=64
